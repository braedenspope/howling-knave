<div class="auth-wrap">
  <div class="hk-card corners auth-card fade-up">
    <p class="stamp-label auth-stamp">Sign aboard the Howling Knave</p>
    <h1 class="auth-title gold-text">Join the Crew</h1>
    <div class="rope-divider" style="margin: 18px 0 22px;"></div>

    @if (error()) {
      <p class="error-text">{{ error() }}</p>
    }
    @if (success()) {
      <p class="success-text">{{ success() }}</p>
    }

    <form class="auth-form" (ngSubmit)="onRegister()">
      <div class="hk-field">
        <label for="reg-display">Display name</label>
        <input id="reg-display" name="displayName" [(ngModel)]="displayName" placeholder="Braeden" required />
      </div>
      <div class="hk-field">
        <label for="reg-char">Character name</label>
        <input id="reg-char" name="characterName" [(ngModel)]="characterName" placeholder="Marwyn Tidecaller" required />
      </div>
      <div class="hk-field">
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" name="email" [(ngModel)]="email" placeholder="you@thecrew.com" required />
      </div>
      <div class="hk-field">
        <label for="reg-pass">Password</label>
        <input id="reg-pass" type="password" name="password" [(ngModel)]="password" placeholder="••••••••" required />
      </div>
      <div class="hk-field">
        <label for="reg-confirm">Confirm password</label>
        <input id="reg-confirm" type="password" name="confirmPassword" [(ngModel)]="confirmPassword" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-brass" style="width: 100%; margin-top: 6px;" [disabled]="submitting()">
        {{ submitting() ? 'Creating…' : 'Join the Crew' }}
      </button>
    </form>

    <div style="text-align: center; margin-top: 14px;">
      <a class="btn btn-ghost" routerLink="/login">Already aboard? Sign in</a>
    </div>
  </div>
</div>
