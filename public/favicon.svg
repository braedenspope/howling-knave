<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="42%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#241a0e"/>
      <stop offset="60%" stop-color="#15100a"/>
      <stop offset="100%" stop-color="#0f0b07"/>
    </radialGradient>
  </defs>

  <!-- medallion -->
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#d4a843" stroke-width="2"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#b87333" stroke-width="1" opacity="0.55"/>

  <!-- compass rose: secondary (diagonal) points in copper -->
  <g transform="rotate(45 32 32)" fill="#b87333">
    <polygon points="32,14 33.6,32 30.4,32"/>
    <polygon points="32,50 33.6,32 30.4,32"/>
    <polygon points="50,32 32,33.6 32,30.4"/>
    <polygon points="14,32 32,33.6 32,30.4"/>
  </g>

  <!-- compass rose: cardinal points in gold -->
  <g fill="#d4a843">
    <polygon points="32,7 34.6,32 29.4,32"/>
    <polygon points="32,57 34.6,32 29.4,32"/>
    <polygon points="57,32 32,34.6 32,29.4"/>
    <polygon points="7,32 32,34.6 32,29.4"/>
  </g>

  <!-- hub -->
  <circle cx="32" cy="32" r="4.2" fill="#d4a843"/>
  <circle cx="32" cy="32" r="1.7" fill="#0f0b07"/>
</svg>
